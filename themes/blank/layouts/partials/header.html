<body>
  <h1 class="site-title">{{.Site.Title}}</h1>
  <nav>
    <ul class="menu">
      {{ range .Site.Menus.main }}
      <li><a class="no-tag" href="{{ .URL | relURL }}">{{ .Name }}</a></li>
      {{ end }}
    </ul>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
    <hr />
  </nav>
</body>
