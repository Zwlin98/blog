{{define "main"}}
<div>
  <h1><span class="title">{{ .Title | markdownify }}</span></h1>
  <h4 class="date">
    <span class="lastmod">Last updated:</span> {{ .Lastmod | time.Format "2006/01/02" }}
    &nbsp;&nbsp;&nbsp;
    <span class="initpost">Published at:</span> {{ .Date | time.Format "2006/01/02" }}
  </h4>
</div>

<main>{{ .Content }}</main>

<div class="discussion" id="giscus-container"></div>
<script>
(function() {
  var theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light_high_contrast';
  var s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', 'Zwlin98/blog');
  s.setAttribute('data-repo-id', 'R_kgDOHXDxFA');
  s.setAttribute('data-category', 'Announcements');
  s.setAttribute('data-category-id', 'DIC_kwDOHXDxFM4CPY5Q');
  s.setAttribute('data-mapping', 'og:title');
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'top');
  s.setAttribute('data-theme', theme);
  s.setAttribute('data-lang', 'zh-CN');
  s.setAttribute('data-loading', 'lazy');
  s.crossOrigin = 'anonymous';
  s.async = true;
  document.getElementById('giscus-container').appendChild(s);
})();
</script>
{{end}}
